<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>手写数字识别</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
        background: #f5f5f5;
    }
    canvas {
        border: 2px solid #ccc;
        border-radius: 8px;
        background: black;
        cursor: crosshair;
    }
    button {
        padding: 12px 30px;
        margin: 10px 6px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    .btn-go { background: #4a6cf7; color: #fff; }
    .btn-clear { background: #ddd; color: #333; }
    .result {
        margin-top: 20px;
        font-size: 48px;
        font-weight: bold;
        color: #4a6cf7;
    }
    .confidence {
        font-size: 14px;
        color: #999;
    }
</style>
</head>
<body>

<h2>✍️ 在黑色画布上写一个数字</h2>

<canvas id="c" width="280" height="280"></canvas>
<br>
<button class="btn-go" onclick="predict()">识别</button>
<button class="btn-clear" onclick="clearCanvas()">清空</button>

<div class="result" id="result">👆 写个数字试试</div>
<div class="confidence" id="conf"></div>

<script>
// ====== 画布逻辑 ======
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
ctx.strokeStyle = "white";
ctx.lineWidth = 20;
ctx.lineCap = "round";
ctx.lineJoin = "round";
let drawing = false;

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height),
    };
}

canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
canvas.onmousemove = (e) => { if (drawing) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } };
canvas.onmouseup = () => drawing = false;
canvas.onmouseleave = () => drawing = false;

function clearCanvas() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, 280, 280);
    document.getElementById("result").innerText = "";
    document.getElementById("conf").innerText = "";
}
clearCanvas();

// ====== 发送请求 ======
async function predict() {
    document.getElementById("result").innerText = "⏳...";

    canvas.toBlob(async (blob) => {
        const fd = new FormData();
        fd.append("image", blob, "digit.png");

        try {
            const res = await fetch("http://localhost:5000/predict", { method: "POST", body: fd });
            const data = await res.json();
            document.getElementById("result").innerText = data.prediction;
            document.getElementById("conf").innerText = "置信度 " + (data.confidence * 100).toFixed(1) + "%";
        } catch (e) {
            document.getElementById("result").innerText = "❌ 连接失败";
        }
    }, "image/png");
}
</script>
</body>
</html>
